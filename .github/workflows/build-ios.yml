name: Build iOS IPA (Auto-sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build IPA with automatic signing
        run: |
          flet build ipa --bundle-id com.yourcompany.jiuchengerp --codesign
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          # 让 flutter build 内部调用 xcodebuild 时自动更新 provisioning profile
          FLUTTER_BUILD_ARGS: "-allowProvisioningUpdates"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ipa/*.ipa
