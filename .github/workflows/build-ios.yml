name: Build iOS IPA (Auto-sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build and export IPA
        id: build
        run: |
          set -e

          # 1. 使用 flet build ipa 构建（它会产生 .xcarchive，即使导出失败也无妨）
          # 我们忽略它的退出码，因为我们要手动导出
          flet build ipa \
            --bundle-id com.yourcompany.jiuchengerp \
            --ios-export-method development \
            --yes || true

          # 2. 查找生成的 .xcarchive
          ARCHIVE=$(find build -name "*.xcarchive" | head -n 1)
          if [ -z "$ARCHIVE" ]; then
            echo "❌ No .xcarchive found. Aborting."
            exit 1
          fi
          echo "✅ Found .xcarchive at: $ARCHIVE"

          # 3. 准备导出选项（自动签名）
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string></string>
          </dict>
          </plist>
          EOF

          # 4. 手动导出 IPA（允许自动更新 Provisioning Profile）
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportPath build/ipa \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration

          # 5. 验证 IPA 是否生成
          IPA_PATH=$(find build/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No .ipa generated after manual export."
            exit 1
          fi
          echo "✅ Successfully generated IPA: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT

        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ${{ steps.build.outputs.ipa_path }}
