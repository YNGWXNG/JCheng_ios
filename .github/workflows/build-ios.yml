name: Build iOS IPA (Auto-sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build IPA with automatic signing
        run: |
          flet build ipa --bundle-id com.yourcompany.jiuchengerp --ios-export-method development --yes
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          FLUTTER_BUILD_ARGS: "-allowProvisioningUpdates -allowProvisioningDeviceRegistration"

      - name: Locate IPA file
        id: locate
        run: |
          # 递归查找所有 .ipa 文件
          IPA_PATH=$(find . -name "*.ipa" -type f | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA file found!"
            # 打印构建目录结构以便调试
            echo "Build directory contents:"
            ls -R build/
            exit 1
          fi
          echo "Found IPA at: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ${{ steps.locate.outputs.ipa_path }}
